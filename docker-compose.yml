# Custom bridge with explicit IPs so backend can reach postgres/redis even
# inside warp's network namespace, where /etc/resolv.conf gets rewritten by
# warp and DNS lookups get hijacked back to 127.0.0.1 by the TIM home router
# (NXDOMAIN-hijacking through the inherited `search homenet.telecomitalia.it`).
networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      internal:
        ipv4_address: 172.30.0.10
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      internal:
        ipv4_address: 172.30.0.11
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-streamo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-streamo}
      - POSTGRES_DB=${POSTGRES_DB:-streamo}
    volumes:
      - ./data/pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-streamo} -d ${POSTGRES_DB:-streamo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Cloudflare WARP egress gateway. The backend/worker/streamo services
  # share this container's network namespace via `network_mode: service:warp`,
  # so all their outbound traffic exits via a Cloudflare IP — vixcloud and
  # TMDB never see the host's residential IP. postgres/redis stay on the
  # compose bridge (no outbound, no need for WARP). Inbound port 7549 and
  # the internal backend port 3000 are published here because the consuming
  # services no longer have their own network identity.
  warp:
    image: caomingjun/warp
    restart: unless-stopped
    cap_add: [NET_ADMIN]
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    devices:
      - /dev/net/tun
    networks:
      internal:
        ipv4_address: 172.30.0.12
    volumes:
      - ./data/warp:/var/lib/cloudflare-warp
    expose:
      - "80"
      - "3000"
    ports:
      - "${APP_HOST_BIND:-0.0.0.0}:${APP_PORT:-5794}:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs https://www.cloudflare.com/cdn-cgi/trace | grep -q 'warp=on' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: streamingimmunity-backend:local
    restart: unless-stopped
    # Share warp's network namespace: outbound TMDB/vixcloud calls exit via
    # Cloudflare. `backend:3000` is no longer reachable by name from other
    # services — peers in the shared namespace (streamo) use 127.0.0.1:3000.
    network_mode: "service:warp"
    volumes:
      - ./data:/data
    environment:
      # JWT secret persists in Postgres _meta if unset.
      - JWT_SECRET=${JWT_SECRET:-}
      - TMDB_API_KEY=${TMDB_API_KEY:?TMDB_API_KEY must be set in .env}
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL:-}
      - REDIS_URL=${REDIS_URL:-redis://172.30.0.10:6379}
      - TMDB_REFRESH_INTERVAL_SECONDS=${TMDB_REFRESH_INTERVAL_SECONDS:-1800}
      - DATABASE_URL=${DATABASE_URL:-postgres://${POSTGRES_USER:-streamo}:${POSTGRES_PASSWORD:-streamo}@172.30.0.11:5432/${POSTGRES_DB:-streamo}}
      - AUTO_MIGRATE=${AUTO_MIGRATE:-1}
      - FCM_PROJECT_ID=${FCM_PROJECT_ID:-}
      - FCM_SERVICE_ACCOUNT_JSON=${FCM_SERVICE_ACCOUNT_JSON:-}
    healthcheck:
      # node 22 includes a global `fetch`; no curl needed in the slim image.
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      warp:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  backend-worker:
    image: streamingimmunity-backend:local
    command: ["node", "dist/server/src/worker.js"]
    restart: unless-stopped
    network_mode: "service:warp"
    volumes:
      - ./data:/data
    environment:
      - JWT_SECRET=${JWT_SECRET:-}
      - TMDB_API_KEY=${TMDB_API_KEY:?TMDB_API_KEY must be set in .env}
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL:-}
      - REDIS_URL=${REDIS_URL:-redis://172.30.0.10:6379}
      - TMDB_REFRESH_INTERVAL_SECONDS=${TMDB_REFRESH_INTERVAL_SECONDS:-1800}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-4}
      - TMDB_JOB_RATE_LIMIT_MAX=${TMDB_JOB_RATE_LIMIT_MAX:-6}
      - TMDB_JOB_RATE_LIMIT_DURATION_MS=${TMDB_JOB_RATE_LIMIT_DURATION_MS:-1000}
      - DATABASE_URL=${DATABASE_URL:-postgres://${POSTGRES_USER:-streamo}:${POSTGRES_PASSWORD:-streamo}@172.30.0.11:5432/${POSTGRES_DB:-streamo}}
      - AUTO_MIGRATE=${AUTO_MIGRATE:-1}
      - FCM_PROJECT_ID=${FCM_PROJECT_ID:-}
      - FCM_SERVICE_ACCOUNT_JSON=${FCM_SERVICE_ACCOUNT_JSON:-}
      - RESUME_REMINDER_INTERVAL_SECONDS=${RESUME_REMINDER_INTERVAL_SECONDS:-86400}
    depends_on:
      warp:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  streamo:
    build: .
    restart: unless-stopped
    network_mode: "service:warp"
    volumes:
      - ./data:/data
    environment:
      # Required — used by the nginx template to inject the TMDB API key.
      - TMDB_API_KEY=${TMDB_API_KEY:?TMDB_API_KEY must be set in .env}
    depends_on:
      warp:
        condition: service_healthy
      backend:
        condition: service_healthy

  # Reverse proxy that terminates HTTPS for streamo using a self-signed
  # cert from a local CA (generated by the `certgen` profile below). Without
  # this the PWA can't register a service worker on the LAN IP, which means
  # no push notifications.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CADDY_HOSTS=${CADDY_HOSTS:-https://192.168.1.99, https://192.168.1.36}
      - CADDY_DEFAULT_SNI=${CADDY_DEFAULT_SNI:-192.168.1.99}
    depends_on:
      warp:
        condition: service_healthy

  # Daemon that checks the streamo cert daily and re-issues it through
  # mkcert (same local CA) once it gets within DAYS_THRESHOLD of expiry.
  # When it renews it restarts the Caddy container so the new cert is
  # picked up. The docker socket is mounted so this container can call
  # `docker restart` against caddy.
  cert-renew:
    image: alpine:3.19
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infra/certs:/certs
      - ./infra/caddy/scripts:/scripts:ro
    environment:
      - DAYS_THRESHOLD=${CERT_DAYS_THRESHOLD:-60}
      - CHECK_INTERVAL_SEC=${CERT_CHECK_INTERVAL_SEC:-86400}
      - CADDY_CONTAINER=${CERT_CADDY_CONTAINER:-streamingimmunity-caddy-1}
      - CERT_SAN=${CERT_SAN:-192.168.1.99 192.168.1.36 localhost 127.0.0.1}
      - APP_OWNER_UID=${APP_OWNER_UID:-1000}
      - APP_OWNER_GID=${APP_OWNER_GID:-1000}
    # Invoke via `sh` so the script doesn't need a +x bit on the host
    # (some filesystems / fresh clones lose the executable flag).
    command: ["sh", "/scripts/cert-loop.sh"]
    depends_on:
      - caddy

  # One-shot cert generator. Run with:
  #   docker compose --profile certgen run --rm certgen
  # Outputs ./infra/certs/{rootCA.pem, rootCA-key.pem, streamo.pem,
  # streamo-key.pem}. Install rootCA.pem on each device that should
  # trust this origin. The daemon `cert-renew` above keeps the cert
  # fresh automatically; this profile is just for forced regeneration.
  certgen:
    # mkcert isn't packaged in alpine stable. Grab the pre-built arm64
    # binary directly from upstream releases — much faster than compiling
    # from source in a golang image. Change the URL if you migrate to a
    # different host architecture.
    image: alpine:3.19
    profiles: ["certgen"]
    working_dir: /certs
    volumes:
      - ./infra/certs:/certs
    environment:
      - CAROOT=/certs
      - CERT_SAN=${CERT_SAN:-192.168.1.99 192.168.1.36 localhost 127.0.0.1}
      - APP_OWNER_UID=${APP_OWNER_UID:-1000}
      - APP_OWNER_GID=${APP_OWNER_GID:-1000}
    command:
      - sh
      - -c
      - |
        set -e
        apk add --no-cache ca-certificates wget >/dev/null
        wget -qO /usr/local/bin/mkcert \
          https://github.com/FiloSottile/mkcert/releases/download/v1.4.4/mkcert-v1.4.4-linux-arm64
        chmod +x /usr/local/bin/mkcert
        mkcert -cert-file streamo.pem -key-file streamo-key.pem $$CERT_SAN
        chmod 644 /certs/streamo.pem /certs/rootCA.pem
        chmod 600 /certs/streamo-key.pem /certs/rootCA-key.pem
        chown "$$APP_OWNER_UID:$$APP_OWNER_GID" /certs/*.pem
        echo
        echo "Generated certs in /certs:"
        ls -la /certs

volumes:
  caddy_data:
  caddy_config:
