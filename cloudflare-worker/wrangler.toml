name = "vixsrc-proxy"
main = "vixsrc-proxy.js"
compatibility_date = "2024-01-01"

# Free tier: 100,000 requests/day
# Workers run on Cloudflare's edge network, hiding your origin IP

# Optional: custom domain (configure in Cloudflare dashboard)
# routes = [
#   { pattern = "proxy.yourdomain.com/*", zone_name = "yourdomain.com" }
# ]

# Or use workers.dev subdomain (default, free):
# Your worker will be available at: vixsrc-proxy.<your-subdomain>.workers.dev
