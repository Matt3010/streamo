services:
  warp:
    image: caomingjun/warp
    restart: unless-stopped
    cap_add: [NET_ADMIN]
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    devices:
      - /dev/net/tun
    volumes:
      - ./proxy-data/warp:/var/lib/cloudflare-warp
    expose:
      - "3000"
    ports:
      - "${IOS_PROXY_PORT:-8787}:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs https://www.cloudflare.com/cdn-cgi/trace | grep -q 'warp=on' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ios-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: "service:warp"
    environment:
      - PROVIDER_CATALOG_LOCALE=${PROVIDER_CATALOG_LOCALE:-it}
      - PROXY_DATA_DIR=/data
    volumes:
      - ./proxy-data/auth:/data
    depends_on:
      warp:
        condition: service_healthy
