networks:
  wg_access:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24

services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges=true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=${WIREGUARD_PUID:-1000}
      - PGID=${WIREGUARD_PGID:-1000}
      - TZ=${TZ:-UTC}
      - SERVERURL=${WIREGUARD_HOST:?WIREGUARD_HOST must be set in .env}
      - SERVERPORT=${WIREGUARD_PORT:-51820}
      # Use one peer name per physical device so revocation stays granular.
      - PEERS=${WIREGUARD_PEERS:?WIREGUARD_PEERS must list at least one peer}
      - INTERNAL_SUBNET=${WIREGUARD_SUBNET:-10.13.13.0}
      # /32 sul Pi: clients tunnel only Pi-bound traffic; other LAN
      # devices stay reachable directly via WiFi so AirPlay/mDNS work.
      - ALLOWEDIPS=${WIREGUARD_ALLOWED_IPS:-192.168.1.99/32}
      - LOG_CONFS=true
    volumes:
      - ./data:/config
      - /lib/modules:/lib/modules:ro
      # Custom config files mounted read-only from the tracked `config/`
      # directory. linuxserver/wireguard only writes its own default
      # versions of these when they're missing, so providing them as bind
      # mounts (which exist before init runs) takes precedence and keeps
      # the customizations under version control. The hosts file is NOT
      # mounted here — it's generated into ./data/coredns/hosts from
      # LAN_IP/LAN_HOSTNAMES (.env) by scripts/prepare-state.sh.
      - ./config/coredns/Corefile:/config/coredns/Corefile:ro
      - ./config/templates/peer.conf:/config/templates/peer.conf:ro
    ports:
      - "${WIREGUARD_PORT:-51820}:${WIREGUARD_PORT:-51820}/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      wg_access:
        ipv4_address: 172.31.0.2
