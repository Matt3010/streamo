services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    restart: unless-stopped
    ports:
      - "${JELLYFIN_PORT:-18096}:8096"
    volumes:
      - ./jellyfin-data/config:/config
      - ./jellyfin-data/cache:/cache
    # No PublishedServerUrl: Jellyfin auto-detects from the request host, so
    # clients reach it at whatever address they used (LAN IP, hotspot, etc.)
    # with no hardcoded host.

  addon:
    build:
      context: ./addon
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${ADDON_PORT:-17871}:7000"
    environment:
      # Internal docker hostname. Jellyfin always transcodes this content, so
      # players never hit the addon directly — only Jellyfin does, over the
      # docker network. No host IP to hardcode; works on any network.
      - ADDON_PUBLIC_URL=${ADDON_PUBLIC_URL:-http://addon:7000}
      - ADDON_DATA_DIR=/data
      - CATALOG_LOCALE=${CATALOG_LOCALE:-it}
      # TMDB key — needed ONLY to translate the imdb/tmdb ids Gelato sends into
      # an SC search. Defaults to the key bundled in the iOS app. Without it the
      # addon still works for direct Stremio use (sc: ids), just not via Gelato.
      - TMDB_API_KEY=${TMDB_API_KEY:-42b62dc72918b626d8ea3e33c35e16a6}
      - TMDB_LANGUAGE=${TMDB_LANGUAGE:-it-IT}
    volumes:
      - ./addon-data:/data
